spring:
  application:
    name: price-tracker
  datasource:
    url: jdbc:mysql://localhost:3306/price_tracker?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5s
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: status
      logic-delete-value: 0
      logic-not-delete-value: 1

knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: change-me-to-a-secure-secret-key-123456
  access-token-expire-minutes: 120
  refresh-token-expire-days: 7
  issuer: price-tracker
